name: Deploy to Production

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: core-v${{ github.run_number }}
          name: "Core Package v${{ github.run_number }}"
          body: |
            ## WebWaka Core Package — Production Release
            
            ### Compliance:
            - ✅ Build Once Use Infinitely
            - ✅ Strict TypeScript — No `any` types
            - ✅ Security Invariants Enforced
            - ✅ Zero Console Logs
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
