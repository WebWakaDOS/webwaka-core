name: Deploy to Production

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: core-v${{ github.run_number }}
          name: "Core Package v${{ github.run_number }}"
          body: |
            ## WebWaka Core Package — Production Release
            
            ### Compliance:
            - ✅ Build Once Use Infinitely
            - ✅ Security Invariants Enforced
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
